<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#f4f3f0">
  <meta name="description" content="JobPicky 求职岗位工作台">
  <title>JobPicky · 岗位雷达</title>
  <link rel="stylesheet" href="/static/css/app.css?v=20260718-4">
  <link rel="stylesheet" href="/static/css/liquid-glass.css?v=20260718-3">
</head>
<body>
  <svg class="svg-defs" aria-hidden="true"><symbol id="i-radar" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="3"/><path d="M12 4v5m0 6v5M4 12h5m6 0h5"/></symbol><symbol id="i-list" viewBox="0 0 24 24"><path d="M8 6h12M8 12h12M8 18h12"/><circle cx="4" cy="6" r="1"/><circle cx="4" cy="12" r="1"/><circle cx="4" cy="18" r="1"/></symbol><symbol id="i-sliders" viewBox="0 0 24 24"><path d="M4 7h10m4 0h2M4 17h2m4 0h10M14 4v6M6 14v6"/></symbol><symbol id="i-link" viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.1.1l2-2a5 5 0 0 0-7.1-7.1l-1.1 1.1M14 11a5 5 0 0 0-7.1-.1l-2 2A5 5 0 0 0 12 20l1.1-1.1"/></symbol><symbol id="i-search" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m20 20-4-4"/></symbol><symbol id="i-close" viewBox="0 0 24 24"><path d="m6 6 12 12M18 6 6 18"/></symbol><symbol id="i-check" viewBox="0 0 24 24"><path d="m5 12 4 4L19 6"/></symbol><symbol id="i-arrow" viewBox="0 0 24 24"><path d="M5 12h14m-5-5 5 5-5 5"/></symbol></svg>
  <svg class="svg-defs" aria-hidden="true"><defs><filter id="liquid-glass-refraction" x="-18%" y="-22%" width="136%" height="144%" color-interpolation-filters="sRGB"><feTurbulence type="fractalNoise" baseFrequency="0.008 0.014" numOctaves="2" seed="7" result="noise"/><feGaussianBlur in="noise" stdDeviation="1.2" result="soft-noise"/><feDisplacementMap in="SourceGraphic" in2="soft-noise" scale="7" xChannelSelector="R" yChannelSelector="B" result="refracted"/><feColorMatrix in="refracted" type="matrix" values="1 0 0 0 .008 0 1 0 0 0 0 0 1 0 -.008 0 0 0 1 0"/></filter></defs></svg>
  <div id="loading-screen" class="loading-screen" aria-live="polite"><span class="spinner"></span><span>正在准备岗位雷达</span></div>

  <main id="onboarding" class="onboarding hidden">
    <header class="onboarding-header"><a class="brand" href="#radar"><span class="brand-mark">J</span><span>JobPicky</span></a></header>
    <section class="builder-page" aria-labelledby="onboarding-title">
      <div class="builder-heading"><p class="eyebrow">首次设置</p><h1 id="onboarding-title">建立你的岗位雷达</h1><p>一步一步确定关注范围，保存后再开始扫描岗位。</p></div>
      <div id="onboarding-builder-host"></div>
    </section>
  </main>

  <div id="workspace" class="app-shell hidden">
    <header class="topbar">
      <a class="brand" href="#radar" aria-label="JobPicky 岗位雷达"><span class="brand-mark">J</span><span>JobPicky</span></a>
      <button id="menu-button" class="icon-button menu-button" type="button" aria-label="打开导航" aria-expanded="false"><span></span><span></span><span></span></button>
      <nav id="main-nav" aria-label="主导航">
        <a href="#integrations" data-route="integrations"><svg><use href="#i-link"/></svg>集成</a>
      </nav>
      <div class="topbar-actions"><span id="top-last-scan" class="last-scan"></span><button class="button primary scan-button" type="button">扫描新岗位</button></div>
    </header>

    <div id="home-notification" class="home-notification" role="status" aria-live="polite" aria-atomic="true"></div>

    <main class="content-shell">
      <section id="view-radar" class="view" data-view="radar">
        <section class="dashboard-workspace" aria-label="岗位雷达概览">
          <div class="dashboard-main">
            <div class="dashboard-primary">
              <div class="mobile-radar-actions"><span>岗位更新</span><button class="button primary scan-button" type="button">扫描新岗位</button></div>
              <section id="scan-summary" class="scan-summary hidden" aria-live="polite"></section>
              <section id="scan-empty" class="scan-empty hidden"><div><strong>岗位雷达已就绪</strong><span>开始扫描后，这里会显示与你偏好匹配的岗位。</span></div><button class="button primary" data-action="scan" type="button">开始扫描</button></section>
              <section id="stats" class="stats hidden" aria-label="岗位摘要"></section>
              <section id="task-panel" class="task-panel hidden" aria-live="polite"></section>
            </div>
            <div id="radar-results">
              <div class="recommendation-heading"><h2>推荐岗位</h2><a href="#jobs" class="library-link">浏览全部岗位库 <svg><use href="#i-arrow"/></svg></a></div>
              <div id="recommendation-tabs" class="recommendation-tabs" role="tablist">
                <button type="button" data-recommendation-scope="today" role="tab">今日推荐</button>
                <button type="button" data-recommendation-scope="recommended" role="tab">全部推荐</button>
                <button type="button" data-recommendation-scope="expiring" role="tab">即将截止</button>
              </div>
              <div class="toolbar recommendation-toolbar">
                <select id="radar-filter-city" aria-label="推荐岗位城市筛选"><option value="">全部城市</option></select>
                <select id="radar-filter-batch" aria-label="推荐岗位招聘类型筛选"><option value="">全部类型</option></select>
                <select id="radar-filter-direction" aria-label="推荐岗位关注方向筛选"><option value="">全部方向</option></select>
                <select id="radar-filter-deadline" aria-label="推荐岗位截止状态筛选"><option value="">全部截止状态</option><option value="open">仍在招聘</option><option value="expiring">7 天内截止</option><option value="expired">已截止</option></select>
                <select id="radar-sort" aria-label="推荐岗位排序"><option value="newest">最近收录</option><option value="deadline">截止日期</option><option value="company">公司名称</option></select>
                <button id="clear-radar-filters" class="button ghost" type="button">清除筛选</button>
              </div>
              <p id="radar-result-count" class="result-count"></p>
              <div id="radar-jobs" class="job-grid" aria-live="polite"></div>
              <nav id="radar-pagination" class="pagination hidden" aria-label="推荐岗位分页"></nav>
            </div>
          </div>
          <button class="home-radar-card" type="button" data-action="edit-preferences" aria-label="调整岗位雷达偏好">
            <header class="profile-radar-heading"><div><h2>我的岗位雷达</h2><p id="home-radar-copy"></p></div><span id="home-radar-status" class="status-badge ready">已就绪</span></header>
            <div id="home-radar-host" class="orbit-radar-host"></div>
            <div id="home-radar-meta"></div>
          </button>
        </section>
      </section>

      <section id="view-jobs" class="view hidden" data-view="jobs">
        <header class="page-header"><div><a class="page-back" href="#radar"><svg><use href="#i-arrow"/></svg>返回岗位雷达</a><h1>全部岗位</h1></div><strong id="all-job-total" class="total-number"></strong></header>
        <div class="toolbar all-job-toolbar"><label class="search-field wide"><svg><use href="#i-search"/></svg><span class="sr-only">搜索岗位或公司</span><input id="job-search" type="search" placeholder="搜索岗位或公司"></label><select id="filter-city" aria-label="城市筛选"><option value="">全部城市</option></select><select id="filter-batch" aria-label="招聘类型筛选"><option value="">全部类型</option></select><select id="filter-deadline" aria-label="截止状态筛选"><option value="">全部截止状态</option><option value="open">仍在招聘</option><option value="expiring">7 天内截止</option><option value="expired">已截止</option></select><select id="filter-company-type" aria-label="企业性质筛选"><option value="">全部企业性质</option></select><select id="job-sort" aria-label="排序"><option value="deadline">截止日期</option><option value="newest">最近收录</option><option value="company">公司名称</option></select><button id="clear-filters" class="button ghost" type="button">清除筛选</button></div>
        <p id="job-result-count" class="result-count"></p><div id="all-jobs" class="job-grid"></div><nav id="job-pagination" class="pagination hidden" aria-label="岗位列表分页"></nav>
      </section>

      <section id="view-preferences" class="view hidden" data-view="preferences">
        <header class="page-header"><div><a class="page-back" href="#radar"><svg><use href="#i-arrow"/></svg>返回岗位雷达</a><h1>调整岗位雷达</h1></div></header>
        <div id="preferences-builder-host" class="hidden"></div>
      </section>

      <section id="view-integrations" class="view hidden" data-view="integrations">
        <header class="page-header"><div><h1>集成</h1><p>按需将推荐结果同步到飞书。</p></div></header>
        <div id="integration-status" class="integration-status"></div>
        <section class="integration-intro"><div><h2>飞书多维表格</h2><p>连接后可同步推荐岗位并发送每日提醒。</p></div><span class="status-badge">可选</span></section>
        <details class="setup-guide"><summary>配置方法</summary><ol><li>在飞书开放平台创建企业自建应用。</li><li>为应用开通多维表格读写权限。</li><li>复制 Base 链接与应用凭据，在下方验证。</li></ol></details>
        <form id="feishu-form" class="credential-form"><label>Base 链接<input id="base-url" type="url" placeholder="https://租户.feishu.cn/base/..."></label><label>App ID<input id="app-id" type="text" autocomplete="off"></label><label>App Secret<span class="password-field"><input id="app-secret" type="password" autocomplete="new-password"><button id="toggle-secret" type="button">显示</button></span></label><p id="feishu-message" class="form-message hidden" role="alert"></p><button id="feishu-submit" class="button primary" type="submit">测试并连接</button></form>
      </section>
    </main>
  </div>

  <template id="radar-builder-template">
    <div id="radar-builder" class="radar-builder">
      <form id="builder-form" class="builder-steps" novalidate>
        <section class="builder-step" data-builder-step="stage"><header><span class="step-index">1</span><div><h2>求职阶段</h2><p class="step-summary"></p></div><button class="step-edit hidden" type="button">修改</button></header><div class="step-body"><p class="step-question">你正在关注哪类招聘？ <small>可多选</small></p><div id="builder-batches" class="stage-grid"></div><button class="button secondary step-continue" type="button">继续选择方向</button></div></section>
        <section class="builder-step" data-builder-step="roles"><header><span class="step-index">2</span><div><h2>关注方向</h2><p class="step-summary"></p></div><button class="step-edit hidden" type="button">修改</button></header><div class="step-body"><p class="step-question">你希望重点关注哪些岗位方向？</p><label class="search-field"><svg><use href="#i-search"/></svg><span class="sr-only">搜索岗位方向</span><input id="builder-role-search" type="search" placeholder="搜索岗位方向，例如 FPGA、嵌入式、算法"></label><div id="role-tabs" class="role-tabs" role="tablist"></div><div id="builder-roles" class="role-options"></div><div class="selection-summary"><span id="role-selection-count"></span><div id="selected-roles" class="selected-list"></div><p id="role-guidance" class="field-hint"></p></div><button class="button secondary step-continue" type="button">继续选择城市</button></div></section>
        <section class="builder-step" data-builder-step="cities"><header><span class="step-index">3</span><div><h2>期望城市</h2><p class="step-summary"></p></div><button class="step-edit hidden" type="button">修改</button></header><div class="step-body"><p class="step-question">你希望重点关注哪些地区？</p><label class="search-field"><svg><use href="#i-search"/></svg><span class="sr-only">搜索省份或城市</span><input id="builder-city-search" type="search" placeholder="搜索省份或城市，例如广东、深圳"></label><div id="selected-cities" class="selected-list"></div><label class="select-field">按省份查找<select id="builder-province-select"><option value="">选择省份</option></select></label><div id="builder-cities" class="city-options"></div><p class="field-hint">可以只选省份，也可以继续选择具体城市。地点待确认的岗位不会被城市条件排除。</p><button class="button secondary step-continue" type="button">继续添加信号</button></div></section>
        <section class="builder-step" data-builder-step="keywords"><header><span class="step-index">4</span><div><h2>补充信号 <small>可选</small></h2><p class="step-summary"></p></div><button class="step-edit hidden" type="button">修改</button></header><div class="step-body"><p class="step-question">还有哪些单位或关键词值得重点关注？</p><div class="signal-section"><h3>单位类型</h3><p class="field-hint">只有主动勾选的类型才会参与匹配，不会默认推荐研究院、银行或国企。</p><div id="builder-organization-groups" class="role-options"></div></div><div class="signal-section"><h3>指定公司或单位</h3><div class="inline-field"><input id="builder-company" type="text" placeholder="例如：华为、国家电网、某某研究所"><button id="add-builder-company" class="button secondary" type="button">添加</button></div><div id="builder-companies" class="selected-list signal-list"></div></div><div class="signal-section"><h3>自定义岗位关键词</h3><div class="inline-field"><input id="builder-keyword" type="text" placeholder="例如：Verilog、驱动开发、数字电源"><button id="add-builder-keyword" class="button secondary" type="button">添加</button></div><div id="builder-keywords" class="selected-list signal-list"></div><p id="keyword-guidance" class="field-hint">支持回车、中文或英文逗号分隔。</p></div><button class="button secondary step-continue" type="button">完成配置</button></div></section>
        <details id="advanced-preferences" class="advanced-preferences"><summary>高级偏好 <span>可选</span></summary><div><h3>不感兴趣的岗位方向</h3><p>命中这些方向的岗位不会被推荐。</p><div id="builder-excluded-roles" class="role-options compact"></div></div></details>
        <p id="builder-error" class="form-message error hidden" role="alert"></p>
        <div class="builder-actions"><button id="cancel-builder" class="button ghost hidden" type="button">取消</button><button id="save-builder" class="button primary" type="submit">创建岗位雷达并开始扫描</button></div>
      </form>
      <div class="radar-preview-column">
        <aside class="radar-preview" aria-live="polite">
          <header class="preview-heading"><div><h2>我的岗位雷达</h2><span id="radar-status" class="status-badge building">构建中</span></div><p id="radar-mode-copy">选择后，雷达会从中心向外形成</p></header>
          <div id="builder-radar-host" class="orbit-radar-host"></div>
          <div id="builder-radar-meta"></div>
        </aside>
        <section id="radar-diff" class="radar-diff hidden"><h3>本次调整</h3><div id="radar-diff-list"></div><p id="radar-diff-scope"></p></section>
      </div>
    </div>
  </template>

  <aside id="job-drawer" class="job-modal hidden" role="dialog" aria-modal="true" aria-hidden="true" aria-labelledby="drawer-title"><div class="job-modal-backdrop" data-action="close-drawer"></div><section class="job-modal-card"><header><div><span class="detail-label">岗位详情</span><h2 id="drawer-title"></h2></div><button class="icon-button" data-action="close-drawer" type="button" aria-label="关闭详情"><svg><use href="#i-close"/></svg></button></header><div id="drawer-content" class="drawer-content"></div><footer id="drawer-actions"></footer></section></aside>
  <div id="toast-region" class="toast-region" aria-live="polite"></div>
  <script type="module" src="/static/js/app.js?v=20260718-4"></script>
</body>
</html>
