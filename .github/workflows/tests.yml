name: tests

on:
  push:
  pull_request:

jobs:
  pytest:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: "3.11"
          - os: windows-latest
            python: "3.11"
          - os: windows-latest
            python: "3.12"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e . pytest
      - run: python -m pytest -q
      - if: runner.os == 'Windows'
        run: python -m pip install -e .[desktop]
      - if: runner.os == 'Windows'
        run: pyinstaller --noconfirm packaging/feishu-job-radar.spec
