[project]
name = "feishu-job-radar"
version = "0.1.0"
description = "面向个人求职者的本地岗位发现与飞书进度管理工具"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.11"
dependencies = [
    "beautifulsoup4>=4.12",
    "openpyxl>=3.1",
    "PyYAML>=6.0",
    "requests>=2.31",
]

[project.scripts]
feishu-job-radar = "job_monitor.cli:main"

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
