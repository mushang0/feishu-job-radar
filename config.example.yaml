# 普通用户只需配置求职偏好和飞书连接信息。
# 抓取间隔、岗位分类、关键词库等使用项目内置安全默认值。

user_profile:
  graduate_years: ["2027届"]
  batches: ["秋招", "提前批", "实习"]
  role_groups: ["硬件/嵌入式", "半导体/芯片"]
  target_industries: []
  target_cities: []
  must_watch_companies: []
  exclude_role_groups: ["销售", "市场", "运营", "HR", "财务"]
  recall_mode: "balanced"
  daily_push_limit: 20

feishu:
  # 必须是 https://你的租户.feishu.cn/base/... 形式，不支持 wiki 链接。
  base_url: ""
  app_id: ""
  app_secret: ""
  # 可选；不配置群机器人也能正常使用工作台。
  webhook_url: ""
